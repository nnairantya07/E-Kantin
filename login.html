<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thursina Welfmart - Platform Belanja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            background: #0a2f6c;
        }

        /* ========== HALAMAN 1: GET STARTED ========== */
        .page-1 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            background-image: url("thursina.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            text-align: center;
        }

        .page-1::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 47, 108, 0.65);
            z-index: 1;
        }

        .logo-large {
            position: relative;
            z-index: 2;
            margin-bottom: 40px;
        }

        .logo-thursina {
            font-size: 4.5rem;
            font-weight: 800;
            color: #f5b81b;
            text-shadow: 4px 4px 15px rgba(0,0,0,0.6);
            letter-spacing: 5px;
        }

        .logo-welfmart {
            font-size: 1.8rem;
            font-weight: 600;
            color: white;
            background: #f5b81b;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 60px;
            margin-top: 15px;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .tagline-big {
            color: white;
            margin-top: 25px;
            font-size: 1.2rem;
            font-weight: 300;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .get-started-btn {
            position: relative;
            z-index: 2;
            margin-top: 50px;
            background: #f5b81b;
            border: none;
            padding: 18px 55px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #0a2f6c;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            font-family: inherit;
        }

        .get-started-btn:hover {
            transform: scale(1.05) translateY(-3px);
            background: #ffcd4a;
        }

        /* ========== HALAMAN 2: PILIH ROLE ========== */
        .page-2 {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .role-card {
            background: white;
            border-radius: 48px;
            padding: 48px 32px;
            max-width: 550px;
            width: 100%;
            text-align: center;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 0.4s ease;
        }

        .role-title {
            font-size: 1.8rem;
            color: #0a2f6c;
            margin-bottom: 10px;
        }

        .role-sub {
            color: #64748b;
            margin-bottom: 20px;
        }

        .role-buttons {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .role-option {
            flex: 1;
            min-width: 180px;
            padding: 28px 20px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 32px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }

        .role-option:hover {
            border-color: #f5b81b;
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .role-icon { font-size: 3rem; margin-bottom: 12px; }
        .role-name { font-size: 1.3rem; font-weight: bold; color: #0a2f6c; }
        .role-desc { font-size: 0.8rem; color: #64748b; margin-top: 8px; }

        .back-link {
            margin-top: 30px;
            display: inline-block;
            color: #0a2f6c;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            font-size: 0.9rem;
        }

        /* ========== HALAMAN 3: LOGIN / SIGN UP ========== */
        .page-3 {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 48px;
            padding: 40px 32px;
            max-width: 450px;
            width: 100%;
            box-shadow: 0 30px 50px rgba(0,0,0,0.3);
            animation: fadeInUp 0.4s ease;
        }

        .role-badge {
            background: #0a2f6c;
            color: #f5b81b;
            padding: 6px 16px;
            border-radius: 60px;
            display: inline-block;
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .login-title {
            font-size: 1.6rem;
            color: #0a2f6c;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.85rem;
            color: #1e293b;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border: 1.5px solid #e2e8f0;
            border-radius: 28px;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #f5b81b;
            box-shadow: 0 0 0 3px rgba(245,184,27,0.2);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #0a2f6c;
            border: none;
            border-radius: 40px;
            color: #f5b81b;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #0e3a7a;
            transform: scale(0.98);
        }

        .signup-prompt {
            text-align: center;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
            color: #475569;
        }

        .signup-link {
            color: #f5b81b;
            font-weight: bold;
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
            font-size: 0.95rem;
            font-family: inherit;
        }

        .back-to-role {
            margin-top: 20px;
            text-align: center;
        }

        .back-btn {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 16px;
            font-size: 0.85rem;
            text-align: center;
        }

        .hidden { display: none; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 550px) {
            .role-buttons { flex-direction: column; }
            .role-option { min-width: auto; }
            .logo-thursina { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <!-- HALAMAN 1: GET STARTED -->
    <div id="page1" class="page-1">
        <div class="logo-large">
            <div class="logo-thursina">THURSINA</div>
            <div class="logo-welfmart">Welfmart</div>
            <div class="tagline-big">✨ Belanja cerdas untuk prestasi terbaik ✨</div>
        </div>
        <button class="get-started-btn" id="getStartedBtn">🚀 Get Started</button>
    </div>

    <!-- HALAMAN 2: PILIH ADMIN ATAU PELANGGAN -->
    <div id="page2" class="page-2 hidden">
        <div class="role-card">
            <div class="role-title">Pilih Akses Anda</div>
            <div class="role-sub">Silakan pilih role untuk melanjutkan</div>
            <div class="role-buttons">
                <div class="role-option" data-role="pelanggan">
                    <div class="role-icon">🛒</div>
                    <div class="role-name">Pelanggan</div>
                    <div class="role-desc">Belanja produk & layanan</div>
                </div>
                <div class="role-option" data-role="admin">
                    <div class="role-icon">👑</div>
                    <div class="role-name">Administrator</div>
                    <div class="role-desc">Kelola toko & data</div>
                </div>
            </div>
            <button class="back-link" id="backToStart">← Kembali</button>
        </div>
    </div>

    <!-- HALAMAN 3: LOGIN / SIGN UP -->
    <div id="page3" class="page-3 hidden">
        <div class="login-card">
            <div style="text-align: center;">
                <span class="role-badge" id="roleBadge">Pelanggan</span>
            </div>
            <div class="login-title" id="loginTitle">Masuk ke Akun</div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="contoh@email.com" required>
                </div>
                <div class="form-group">
                    <label>🔒 Password</label>
                    <input type="password" id="password" placeholder="Masukkan password" required>
                </div>
                <button type="submit" class="login-btn" id="submitBtn">🔐 Login</button>
            </form>

            <div class="signup-prompt">
                Belum punya akun? 
                <button class="signup-link" id="showSignupBtn">Daftar Sekarang</button>
            </div>

            <div class="back-to-role">
                <button class="back-btn" id="backToRole">← Ganti Role / Kembali</button>
            </div>

            <div id="messageArea" class="message"></div>
        </div>
    </div>

    <script>
        // ========== DATABASE (localStorage) ==========
        function getDB() {
            let db = localStorage.getItem('thursina_welfmart_users');
            if (!db) {
                const defaultDB = {
                    pelanggan: {
                        "pelanggan@test.com": "pass123",
                        "user@welfmart.com": "belanja"
                    },
                    admin: {
                        "admin@thursina.com": "admin123",
                        "thursina@welfmart.id": "thursina2024"
                    }
                };
                localStorage.setItem('thursina_welfmart_users', JSON.stringify(defaultDB));
                return defaultDB;
            }
            return JSON.parse(db);
        }

        function saveDB(db) {
            localStorage.setItem('thursina_welfmart_users', JSON.stringify(db));
        }

        // State
        let currentRole = null;
        let isSignupMode = false;

        // DOM elements
        const page1 = document.getElementById('page1');
        const page2 = document.getElementById('page2');
        const page3 = document.getElementById('page3');
        const getStartedBtn = document.getElementById('getStartedBtn');
        const backToStart = document.getElementById('backToStart');
        const backToRole = document.getElementById('backToRole');
        const showSignupBtn = document.getElementById('showSignupBtn');
        const loginForm = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const roleBadge = document.getElementById('roleBadge');
        const loginTitle = document.getElementById('loginTitle');
        const messageArea = document.getElementById('messageArea');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');

        function showPage(pageNum) {
            page1.classList.add('hidden');
            page2.classList.add('hidden');
            page3.classList.add('hidden');
            if (pageNum === 1) page1.classList.remove('hidden');
            if (pageNum === 2) page2.classList.remove('hidden');
            if (pageNum === 3) page3.classList.remove('hidden');
        }

        function resetForm() {
            emailInput.value = '';
            passwordInput.value = '';
            messageArea.innerHTML = '';
            messageArea.className = 'message';
        }

        function showMessage(msg, type) {
            messageArea.innerHTML = type === 'error' ? `❌ ${msg}` : `✅ ${msg}`;
            messageArea.style.background = type === 'error' ? '#fee2e2' : '#e6f7e6';
            messageArea.style.color = type === 'error' ? '#991b1b' : '#166534';
            setTimeout(() => {
                if (messageArea.innerHTML === `❌ ${msg}` || messageArea.innerHTML === `✅ ${msg}`) {
                    // biarkan
                }
            }, 3000);
        }

        function updatePage3UI() {
            if (currentRole === 'pelanggan') {
                roleBadge.textContent = '🛒 Pelanggan';
            } else {
                roleBadge.textContent = '👑 Administrator';
            }

            if (isSignupMode) {
                loginTitle.textContent = 'Daftar Akun Baru';
                submitBtn.textContent = '📝 Daftar';
                let confirmGroup = document.getElementById('confirmGroup');
                if (!confirmGroup) {
                    const form = loginForm;
                    const newGroup = document.createElement('div');
                    newGroup.className = 'form-group';
                    newGroup.id = 'confirmGroup';
                    newGroup.innerHTML = `
                        <label>✓ Konfirmasi Password</label>
                        <input type="password" id="confirmPassword" placeholder="Ulangi password" required>
                    `;
                    const submitBtnElem = document.querySelector('#loginForm .login-btn');
                    form.insertBefore(newGroup, submitBtnElem);
                }
            } else {
                loginTitle.textContent = 'Masuk ke Akun';
                submitBtn.textContent = '🔐 Login';
                const confirmGroup = document.getElementById('confirmGroup');
                if (confirmGroup) confirmGroup.remove();
            }
            resetForm();
        }

        function handleAuthSubmit(e) {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();

            if (!email || !password) {
                showMessage('Harap isi email dan password!', 'error');
                return;
            }

            const db = getDB();
            const roleData = db[currentRole];

            if (isSignupMode) {
                const confirmPass = document.getElementById('confirmPassword')?.value.trim();
                if (!confirmPass) {
                    showMessage('Harap konfirmasi password!', 'error');
                    return;
                }
                if (password !== confirmPass) {
                    showMessage('Password dan konfirmasi tidak cocok!', 'error');
                    return;
                }
                if (password.length < 4) {
                    showMessage('Password minimal 4 karakter', 'error');
                    return;
                }
                if (roleData && roleData[email]) {
                    showMessage(`Email sudah terdaftar sebagai ${currentRole}. Silakan login.`, 'error');
                    return;
                }
                if (!db[currentRole]) db[currentRole] = {};
                db[currentRole][email] = password;
                saveDB(db);
                showMessage(`✅ Pendaftaran berhasil! Silakan login.`, 'success');
                isSignupMode = false;
                updatePage3UI();
            } else {
                if (!roleData || !roleData[email]) {
                    showMessage(`❌ Email tidak ditemukan sebagai ${currentRole}. Silakan daftar dulu.`, 'error');
                    return;
                }
                if (roleData[email] !== password) {
                    showMessage('❌ Password salah!', 'error');
                    return;
                }
                const roleName = currentRole === 'pelanggan' ? 'Pelanggan' : 'Admin';
                showMessage(`🎉 Selamat datang, ${email}! Login sebagai ${roleName} berhasil.`, 'success');
                setTimeout(() => {
                    alert(`✨ Berhasil login sebagai ${roleName} ✨\nSelamat datang di Thursina Welfmart!`);
                    resetToStart();
                }, 1000);
            }
        }

        function selectRole(role) {
            currentRole = role;
            isSignupMode = false;
            updatePage3UI();
            showPage(3);
        }

        function resetToStart() {
            currentRole = null;
            isSignupMode = false;
            showPage(1);
        }

        // Event Listeners
        getStartedBtn.addEventListener('click', () => showPage(2));
        backToStart.addEventListener('click', () => resetToStart());
        backToRole.addEventListener('click', () => {
            currentRole = null;
            isSignupMode = false;
            showPage(2);
        });
        showSignupBtn.addEventListener('click', () => {
            if (!currentRole) {
                showMessage('Silakan pilih role terlebih dahulu!', 'error');
                showPage(2);
                return;
            }
            isSignupMode = true;
            updatePage3UI();
        });
        loginForm.addEventListener('submit', handleAuthSubmit);

        // Pilihan role di page2
        document.querySelectorAll('.role-option').forEach(option => {
            option.addEventListener('click', (e) => {
                const role = option.getAttribute('data-role');
                selectRole(role);
            });
        });

        // Initial
        showPage(1);
    </script>
</body>
</html>
