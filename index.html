<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Kantin Thursina - Dashboard</title>
    <style>
        :root {
            --biru-thursina: #0a2f6c;
            --kuning-thursina: #f5b81b;
            --putih: #ffffff;
            --abu-muda: #f4f4f4;
            --merah: #ef4444;
            --hijau: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--abu-muda);
            color: #334155;
        }

        /* Navbar */
        header {
            background-color: var(--biru-thursina);
            color: var(--putih);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--kuning-thursina);
        }

        nav {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-tag {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-logout {
            background-color: var(--merah);
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-logout:hover { background-color: #dc2626; }

        /* Hero Section */
        .hero {
            background-color: var(--biru-thursina);
            color: white;
            text-align: center;
            padding: 40px 20px;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
        }

        .hero h1 { font-size: 2.3rem; margin-bottom: 5px; }
        .hero p { color: var(--kuning-thursina); font-size: 1.1rem; }

        .container { padding: 40px 5%; max-width: 1200px; margin: 0 auto; }

        h2 {
            color: var(--biru-thursina);
            border-left: 5px solid var(--kuning-thursina);
            padding-left: 10px;
            margin-bottom: 20px;
        }

        /* Panel CRUD Admin */
        .admin-panel {
            background: white;
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 35px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px dashed var(--kuning-thursina);
        }

        .admin-form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)) 150px;
            gap: 15px;
            align-items: end;
        }

        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 0.85rem; font-weight: 600; color: #64748b; }
        .admin-form input, .admin-form select {
            padding: 12px;
            border-radius: 10px;
            border: 1.5px solid #cbd5e1;
            font-size: 0.95rem;
        }

        .btn-save {
            background: var(--biru-thursina);
            color: var(--kuning-thursina);
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-cancel { background: #64748b; color: white; border: none; border-radius: 10px; padding: 12px; cursor: pointer; margin-top: 10px; }

        /* Grid Item Menu */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); }
        .card-img {
            height: 140px;
            background-color: #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
        }

        .card-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card-info h3 { color: var(--biru-thursina); margin: 0; }
        .price { color: #e67e22; font-weight: bold; font-size: 1.2rem; margin: 10px 0; }

        .btn-order {
            width: 100%;
            padding: 10px;
            background-color: var(--biru-thursina);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .admin-actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-edit { background: #f59e0b; color: white; flex: 1; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-delete { background: var(--merah); color: white; flex: 1; border: none; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        /* Section Keranjang */
        .cart-section {
            background: white;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--biru-thursina);
        }

        .cart-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .cart-table th, .cart-table td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        
        .qty-box { display: flex; align-items: center; gap: 8px; }
        .btn-qty { background: #cbd5e1; border: none; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .cart-total-box {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-checkout {
            background: var(--hijau); color: white; padding: 12px 30px; border: none; border-radius: 10px; font-size: 1rem; font-weight: bold; cursor: pointer;
        }

        .hidden { display: none !important; }
        footer { text-align: center; padding: 20px; color: #888; font-size: 0.9rem; margin-top: 40px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">E-Kantin.</div>
        <nav>
            <div class="user-tag" id="userDisplay">Memuat...</div>
            <a onclick="logout()" class="btn-logout">Keluar</a>
        </nav>
    </header>

    <section class="hero">
        <h1 id="heroWelcome">E-Kantin Thursina</h1>
        <p>Pesan Makan Lebih Cepat, Belajar Jadi Lebih Nikmat</p>
    </section>

    <div class="container">

        <div id="adminPanel" class="admin-panel hidden">
            <h3 id="formTitle" style="color: var(--biru-thursina); margin-bottom: 15px;">👑 Tambah Menu Baru (Admin)</h3>
            <form class="admin-form" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                <div class="form-group">
                    <label>Nama Menu</label>
                    <input type="text" id="productName" placeholder="Nasi Goreng" required>
                </div>
                <div class="form-group">
                    <label>Harga (Rp)</label>
                    <input type="number" id="productPrice" placeholder="15000" required>
                </div>
                <div class="form-group">
                    <label>Kategori Gambar</label>
                    <select id="productIcon">
                        <option value="🥘">🥘 Makanan Berat</option>
                        <option value="🍜">🍜 Mie / Bakso</option>
                        <option value="🥤">🥤 Minuman</option>
                    </select>
                </div>
                <button type="submit" id="btnSaveProduct" class="btn-save">Simpan</button>
            </form>
            <button id="btnCancelEdit" class="btn-cancel hidden" onclick="clearAdminForm()">Batal Edit</button>
        </div>

        <h2>Menu Populer</h2>
        <div id="menuGrid" class="menu-grid">
            </div>

        <div id="cartSection" class="cart-section">
            <h2>🛒 Keranjang Belanja Anda</h2>
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Menu</th>
                        <th>Harga</th>
                        <th>Jumlah</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody id="cartRows">
                    </tbody>
            </table>
            <div class="cart-total-box">
                <h3>Total: <span id="cartTotal" style="color: #e67e22;">Rp 0</span></h3>
                <button onclick="checkout()" class="btn-checkout">Bayar Sekarang</button>
            </div>
        </div>

    </div>

    <footer>E-Kantin Thursina</footer>

    <script>
        const currentRole = localStorage.getItem('user_role');
        const loggedInUser = localStorage.getItem('user_logged');
        let cart = [];

        // Proteksi Halaman
        if (!currentRole || !loggedInUser) {
            alert('Akses Ditolak! Anda harus login terlebih dahulu.');
            window.location.href = 'login.html';
        }

        // Data Baku Utama
        const initialProducts = [
            { id: 1, name: "Nasi Goreng Spesial", price: 15000, icon: "🥘" },
            { id: 2, name: "Mie Ayam Bakso", price: 12000, icon: "🍜" },
            { id: 3, name: "Es Teh Manis", price: 5000, icon: "🥤" }
        ];

        function getProducts() {
            let data = localStorage.getItem('thursina_menu_products');
            if (!data) {
                localStorage.setItem('thursina_menu_products', JSON.stringify(initialProducts));
                return initialProducts;
            }
            return JSON.parse(data);
        }

        function setProducts(data) {
            localStorage.setItem('thursina_menu_products', JSON.stringify(data));
        }

        function initPage() {
            document.getElementById('userDisplay').innerText = `👤 ${loggedInUser} (${currentRole})`;
            
            if (currentRole === 'admin') {
                document.getElementById('adminPanel').classList.remove('hidden');
                document.getElementById('cartSection').classList.add('hidden');
                document.getElementById('heroWelcome').innerText = "Dashboard Manajemen Admin";
            } else {
                document.getElementById('adminPanel').classList.add('hidden');
                document.getElementById('cartSection').classList.remove('hidden');
            }
            renderMenu();
        }

        // 5. MENAMPILKAN PRODUK
        function renderMenu() {
            const products = getProducts();
            const grid = document.getElementById('menuGrid');
            grid.innerHTML = '';

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'card';
                
                let actionBtn = `<button class="btn-order" onclick="addToCart(${p.id})">Tambah ke Keranjang</button>`;
                if (currentRole === 'admin') {
                    actionBtn = `
                        <div class="admin-actions">
                            <button class="btn-edit" onclick="editProduct(${p.id})">✏️ Edit</button>
                            <button class="btn-delete" onclick="deleteProduct(${p.id})">❌ Hapus</button>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="card-img">${p.icon}</div>
                    <div class="card-info">
                        <h3>${p.name}</h3>
                        <div class="price">Rp ${p.price.toLocaleString('id-ID')}</div>
                        ${actionBtn}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 2 & 3. TAMBAH & EDIT PRODUK
        function saveProduct(e) {
            e.preventDefault();
            const id = document.getElementById('productId').value;
            const name = document.getElementById('productName').value.trim();
            const price = parseInt(document.getElementById('productPrice').value);
            const icon = document.getElementById('productIcon').value;

            let products = getProducts();

            if (id) {
                // Proses Edit data lama (Kriteria 3)
                products = products.map(p => p.id == id ? { id: parseInt(id), name, price, icon } : p);
                alert('Produk berhasil diubah!');
            } else {
                // Proses Tambah data baru (Kriteria 2)
                products.push({ id: Date.now(), name, price, icon });
                alert('Produk baru ditambahkan!');
            }

            setProducts(products);
            clearAdminForm();
            renderMenu();
        }

        function editProduct(id) {
            const products = getProducts();
            const p = products.find(prod => prod.id === id);
            if (p) {
                document.getElementById('productId').value = p.id;
                document.getElementById('productName').value = p.name;
                document.getElementById('productPrice').value = p.price;
                document.getElementById('productIcon').value = p.icon;
                
                document.getElementById('formTitle').innerText = "✏️ Edit Menu Terpilih";
                document.getElementById('btnCancelEdit').classList.remove('hidden');
            }
        }

        // 4. HAPUS PRODUK
        function deleteProduct(id) {
            if (confirm('Apakah kamu yakin mau menghapus menu ini?')) {
                let products = getProducts();
                products = products.filter(p => p.id !== id);
                setProducts(products);
                renderMenu();
            }
        }

        function clearAdminForm() {
            document.getElementById('productId').value = '';
            document.getElementById('productName').value = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('formTitle').innerText = "👑 Tambah Menu Baru (Admin)";
            document.getElementById('btnCancelEdit').classList.add('hidden');
        }

        // 1. LOGIKA TRANSAKSI JAVASCRIPT
        function addToCart(id) {
            const products = getProducts();
            const product = products.find(p => p.id === id);
            const exist = cart.find(item => item.id === id);

            if (exist) {
                exist.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderCart();
        }

        function changeQty(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) {
                item.qty += delta;
                if (item.qty <= 0) cart = cart.filter(i => i.id !== id);
                renderCart();
            }
        }

        function renderCart() {
            const rows = document.getElementById('cartRows');
            rows.innerHTML = '';
            let total = 0;

            if (cart.length === 0) {
                rows.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#888;">Keranjang belanja Anda masih kosong.</td></tr>`;
                document.getElementById('cartTotal').innerText = "Rp 0";
                return;
            }

            cart.forEach(item => {
                const subtotal = item.price * item.qty;
                total += subtotal;
                rows.innerHTML += `
                    <tr>
                        <td>${item.icon} ${item.name}</td>
                        <td>Rp ${item.price.toLocaleString('id-ID')}</td>
                        <td>
                            <div class="qty-box">
                                <button class="btn-qty" onclick="changeQty(${item.id}, -1)">-</button>
                                <span>${item.qty}</span>
                                <button class="btn-qty" onclick="changeQty(${item.id}, 1)">+</button>
                            </div>
                        </td>
                        <td>Rp ${subtotal.toLocaleString('id-ID')}</td>
                    </tr>
                `;
            });
            document.getElementById('cartTotal').innerText = `Rp ${total.toLocaleString('id-ID')}`;
        }

        function checkout() {
            if (cart.length === 0) {
                alert('Keranjang belanja kamu masih kosong!');
                return;
            }
            alert('🎉 Transaksi Berhasil!\nPesanan kamu sudah masuk antrean dapur E-Kantin.');
            cart = [];
            renderCart();
        }

        function logout() {
            localStorage.removeItem('user_role');
            localStorage.removeItem('user_logged');
            window.location.href = 'login.html';
        }

        initPage();
    </script>
</body>
</html>
