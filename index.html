<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartCash</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #003380; /* Biru Thursina */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }
        h2 { color: #003380; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .btn-login {
            background-color: #FFC107; /* Kuning Thursina */
            color: #003380;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background-color: #e6af06; }
        a { color: #003380; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Login SmartCash</h2>
        <form>
            <input type="text" placeholder="Username (Admin/User)" required>
            <input type="password" placeholder="Password" required>
            <button type="button" class="btn-login">MASUK</button>
        </form>
        <p><a href="index.html">← Kembali ke Menu</a></p>
    </div>
</body>
</html>
